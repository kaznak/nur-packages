name: update

on:
  schedule:
    # 毎週月曜 04:00 UTC (= JST 13:00)
    - cron: '0 4 * * 1'
  workflow_dispatch:
    inputs:
      package:
        description: '更新する単一パッケージ (空なら全 nixUpdate=true パッケージ)'
        required: false
        default: ''

permissions:
  contents: write

jobs:
  # nur-packages.json から nixUpdate=true なエントリを取り出して
  # {package, extraArgs, preBuild} 形式の matrix を生成する。
  # workflow_dispatch の inputs.package が指定されていれば、その 1 件だけに
  # 絞った matrix を生成し、後続 job 側での per-job skip 判定をなくす。
  # 不正な package 名 (未登録 or nixUpdate=false) はここで明示的に fail。
  setup:
    name: derive matrix from nur-packages.json
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.matrix.outputs.matrix }}
    steps:
      - uses: actions/checkout@v5
      - id: matrix
        env:
          WANT: ${{ inputs.package }}
        run: |
          matrix=$(jq -c --arg want "$WANT" '
            {include: [
              to_entries[]
              | select(.value.nixUpdate and ($want == "" or .key == $want))
              | {
                  package: .key,
                  extraArgs: ((.value.nixUpdateExtraArgs // []) | join(" ")),
                  preBuild: (.value.nixUpdatePreBuild // false)
                }
            ]}' nur-packages.json)
          if [ -n "$WANT" ] && [ "$(echo "$matrix" | jq '.include | length')" = "0" ]; then
            echo "::error::package '$WANT' not found or nixUpdate=false in nur-packages.json"
            exit 1
          fi
          echo "matrix=$matrix" | tee -a "$GITHUB_OUTPUT"

  update:
    needs: setup
    name: nix-update ${{ matrix.package }}
    runs-on: ubuntu-latest
    strategy:
      # 各 job が main に直接 push するため逐次化する (concurrent push の
      # 衝突回避)。週次 cron なので順次でも数十分以内。
      max-parallel: 1
      fail-fast: false
      matrix: ${{ fromJson(needs.setup.outputs.matrix) }}
    steps:
      - uses: actions/checkout@v5

      - name: Install Nix
        uses: cachix/install-nix-action@v31
        with:
          extra_nix_config: |
            experimental-features = nix-command flakes
            accept-flake-config = true

      # poetry2nix 系のように nix-update の eval が IFD (readFile from src)
      # を要求するパッケージは、fresh runner では source derivation が未 realize
      # で eval が落ちる。nur-packages.json で nixUpdatePreBuild=true を指定した
      # ものは事前に `nix build` で source 等を store に入れておく。
      - name: Pre-build (realize sources for IFD-heavy packages)
        if: matrix.preBuild
        run: nix build --no-link '.#${{ matrix.package }}' --print-build-logs

      # nix-update が flake attribute のバージョンとハッシュを書き換え、
      # 変更があれば差分が working tree に残る。
      # matrix.extraArgs はクオートせず word-split させて args として流す
      # (各値に空白を含まない前提)。
      - name: Run nix-update
        run: nix run nixpkgs#nix-update -- --flake '${{ matrix.package }}' ${{ matrix.extraArgs }}

      # GITHUB_TOKEN (contents: write) で main に直接 push する。
      # PAT 不要、PR 経由のセレモニーも省略。前段の matrix が逐次なので、
      # 直前の job が main を進めていても pull --rebase で吸収できる。
      - name: Commit and push update
        run: |
          if [ -z "$(git status --porcelain)" ]; then
            echo "No changes from nix-update, skipping commit."
            exit 0
          fi
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add -A
          git commit -m "${{ matrix.package }}: update via nix-update"
          git pull --rebase origin main
          git push origin main
