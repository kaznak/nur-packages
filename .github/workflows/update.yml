name: update

on:
  schedule:
    # 毎週月曜 04:00 UTC (= JST 13:00)
    - cron: '0 4 * * 1'
  workflow_dispatch:
    inputs:
      package:
        description: '更新する単一パッケージ (空なら全 nixUpdate=true パッケージ)'
        required: false
        default: ''

permissions:
  contents: write
  pull-requests: write

# 補足: secrets.GITHUB_TOKEN で作られた PR は他の workflow を起動しないため、
# 自動更新 PR で ci.yml を自動実行したい場合は repo scope の PAT を
# secrets.NIX_UPDATE_TOKEN に登録すると下の token: で使われる。
# 未設定なら GITHUB_TOKEN にフォールバック (PR は作られるが CI は手動再実行)。

jobs:
  # nur-packages.json から nixUpdate=true なエントリを取り出し、
  # {package, extraArgs} 形式の matrix を生成する。per-package の追加引数
  # (--src-only 等) はここで JSON から取り出して matrix の値として流すため、
  # 後続 job も他のレイヤも JSON を読む必要はない。
  setup:
    name: derive matrix from nur-packages.json
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.matrix.outputs.matrix }}
    steps:
      - uses: actions/checkout@v5
      - id: matrix
        run: |
          matrix=$(jq -c '{include: [to_entries[] | select(.value.nixUpdate) | {package: .key, extraArgs: ((.value.nixUpdateExtraArgs // []) | join(" "))}]}' nur-packages.json)
          echo "matrix=$matrix" >> "$GITHUB_OUTPUT"

  update:
    needs: setup
    name: nix-update ${{ matrix.package }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix: ${{ fromJson(needs.setup.outputs.matrix) }}
    steps:
      - uses: actions/checkout@v5

      - name: Skip if workflow_dispatch package filter set and mismatched
        id: filter
        run: |
          want='${{ inputs.package }}'
          have='${{ matrix.package }}'
          if [ -n "$want" ] && [ "$want" != "$have" ]; then
            echo "skip=true" >> "$GITHUB_OUTPUT"
          else
            echo "skip=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Install Nix
        if: steps.filter.outputs.skip == 'false'
        uses: cachix/install-nix-action@v31
        with:
          extra_nix_config: |
            experimental-features = nix-command flakes
            accept-flake-config = true

      # nix-update が flake attribute のバージョンとハッシュを書き換え、
      # 変更があれば差分が working tree に残る。
      # matrix.extraArgs はクオートせず word-split させて args として流す
      # (各値に空白を含まない前提)。
      - name: Run nix-update
        if: steps.filter.outputs.skip == 'false'
        run: nix run nixpkgs#nix-update -- --flake '${{ matrix.package }}' ${{ matrix.extraArgs }}

      - name: Create or update PR
        if: steps.filter.outputs.skip == 'false'
        uses: peter-evans/create-pull-request@v8
        with:
          token: ${{ secrets.NIX_UPDATE_TOKEN || secrets.GITHUB_TOKEN }}
          branch: update/${{ matrix.package }}
          delete-branch: true
          commit-message: "${{ matrix.package }}: update via nix-update"
          title: "${{ matrix.package }}: update via nix-update"
          body: |
            Automated update for `${{ matrix.package }}` via
            [`nix-update`](https://github.com/Mic92/nix-update).

            - Review the version / hash diff.
            - For multi-arch packages confirm hashes for architectures other
              than `x86_64-linux` were updated as needed (nix-update only
              refreshes the runner's system). See `nur-packages.json` for
              per-package notes.
            - CI builds every flake output via `nix flake check`; merge once green.
          labels: |
            automated
            dependencies
